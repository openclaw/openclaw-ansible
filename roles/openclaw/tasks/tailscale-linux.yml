---
# Linux-specific Tailscale installation (Debian/Ubuntu)

- name: Add Tailscale GPG key
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      DIST="{{ ansible_distribution | lower }}"
      RELEASE="{{ ansible_distribution_release }}"
      curl -fsSL "https://pkgs.tailscale.com/stable/${DIST}/${RELEASE}.noarmor.gpg" | \
        tee /usr/share/keyrings/tailscale-archive-keyring.gpg > /dev/null
    creates: /usr/share/keyrings/tailscale-archive-keyring.gpg
    executable: /bin/bash

- name: Add Tailscale repository
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      DIST="{{ ansible_distribution | lower }}"
      RELEASE="{{ ansible_distribution_release }}"
      curl -fsSL "https://pkgs.tailscale.com/stable/${DIST}/${RELEASE}.tailscale-keyring.list" | \
        tee /etc/apt/sources.list.d/tailscale.list > /dev/null
    creates: /etc/apt/sources.list.d/tailscale.list
    executable: /bin/bash

- name: Update apt cache after adding Tailscale repo
  ansible.builtin.apt:
    update_cache: true

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present

- name: Enable Tailscale service (Linux)
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Check if Tailscale is already connected (Linux)
  ansible.builtin.command: tailscale status --json
  register: tailscale_status_linux
  changed_when: false
  failed_when: false

- name: Auto-connect Tailscale with auth key
  ansible.builtin.command: tailscale up --authkey {{ tailscale_authkey }}
  register: tailscale_connect
  changed_when: tailscale_connect.rc == 0
  no_log: true
  when:
    - tailscale_status_linux.rc != 0
    - tailscale_authkey | default('') | length > 0

- name: Set Tailscale operator to openclaw user
  ansible.builtin.command: tailscale set --operator={{ openclaw_user }}
  register: tailscale_set_operator
  changed_when: tailscale_set_operator.rc == 0
  when: tailscale_authkey | default('') | length > 0

- name: Display Tailscale auth URL if not connected (Linux)
  ansible.builtin.debug:
    msg:
      - "============================================"
      - "Tailscale installed but not connected yet"
      - "============================================"
      - ""
      - "To connect this machine to your Tailnet:"
      - "Run: sudo tailscale up"
      - ""
      - "For unattended installation, use an auth key:"
      - "sudo tailscale up --authkey tskey-auth-xxxxx"
      - ""
      - "Get auth key from: https://login.tailscale.com/admin/settings/keys"
      - ""
      - "To allow the openclaw user to run tailscale serve:"
      - "Run: sudo tailscale set --operator={{ openclaw_user }}"
  when:
    - tailscale_status_linux.rc != 0
    - tailscale_authkey | default('') | length == 0
