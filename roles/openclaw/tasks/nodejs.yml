---
- name: Install Node.js (Debian family)
  ansible.builtin.include_tasks: nodejs-debian.yml
  when: ansible_os_family == 'Debian'

- name: Install Node.js (RedHat family)
  ansible.builtin.include_tasks: nodejs-redhat.yml
  when: ansible_os_family == 'RedHat'

- name: Check if pnpm is already installed
  ansible.builtin.command: pnpm --version
  register: pnpm_check
  failed_when: false
  changed_when: false

- name: Install pnpm globally
  ansible.builtin.command: npm install -g pnpm
  when: pnpm_check.rc != 0
  changed_when: pnpm_check.rc != 0

- name: Verify Node.js installation
  ansible.builtin.command: node --version
  register: node_version
  changed_when: false

- name: Verify pnpm installation
  ansible.builtin.command: pnpm --version
  register: pnpm_version
  changed_when: false

- name: Display Node.js and pnpm versions
  ansible.builtin.debug:
    msg:
      - "Node.js version: {{ node_version.stdout }}"
      - "pnpm version: {{ pnpm_version.stdout }}"
