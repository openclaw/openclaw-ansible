---
# RedHat/Fedora-specific system tools installation (dnf-based)

- name: Install essential system tools (RedHat/Fedora - dnf)
  ansible.builtin.dnf:
    name:
      # Editors
      - vim-enhanced
      - nano
      # Version control
      - git
      - git-lfs
      # Network tools
      - curl
      - wget
      - nmap-ncat
      - net-tools
      - bind-utils
      - iputils
      - traceroute
      - tcpdump
      - nmap
      - socat
      - telnet
      # Debugging tools
      - strace
      - lsof
      - gdb
      - htop
      - iotop
      - iftop
      - sysstat
      - procps-ng
      # System utilities
      - tmux
      - tree
      - jq
      - unzip
      - rsync
      - less
      # Build essentials for development
      - gcc
      - gcc-c++
      - make
      - file
    state: present
    update_cache: true

- name: Deploy global vim configuration (RedHat/Fedora)
  ansible.builtin.template:
    src: vimrc.j2
    dest: /etc/vimrc.local
    owner: root
    group: root
    mode: '0644'
