---
- name: Set control-plane project dir fact
  ansible.builtin.set_fact:
    openclaw_control_plane_profile_dir: "{{ profile.project_dir | default(openclaw_control_plane_runtime_root ~ '/' ~ profile.name) }}"

- name: Ensure profile project root exists
  ansible.builtin.file:
    path: "{{ openclaw_control_plane_profile_dir }}"
    state: directory
    owner: "{{ openclaw_control_plane_owner }}"
    group: "{{ openclaw_control_plane_group }}"
    mode: '0755'

- name: Ensure profile project directories exist
  ansible.builtin.file:
    path: "{{ openclaw_control_plane_profile_dir }}/{{ item }}"
    state: directory
    owner: "{{ openclaw_control_plane_owner }}"
    group: "{{ openclaw_control_plane_group }}"
    mode: '0755'
  loop:
    - data
    - prometheus
    - grafana/provisioning/datasources
    - grafana/dashboards
    - loki

- name: Render control-plane env file
  ansible.builtin.template:
    src: control-plane.env.j2
    dest: "{{ openclaw_control_plane_profile_dir }}/.env"
    owner: "{{ openclaw_control_plane_env_owner }}"
    group: "{{ openclaw_control_plane_env_group }}"
    mode: '0640'
  no_log: true

- name: Render compose stack for full mode
  ansible.builtin.template:
    src: docker-compose.full.yml.j2
    dest: "{{ openclaw_control_plane_profile_dir }}/docker-compose.yml"
    owner: "{{ openclaw_control_plane_owner }}"
    group: "{{ openclaw_control_plane_group }}"
    mode: '0644'
  when: profile.mode == 'full'

- name: Render compose stack for lite mode
  ansible.builtin.template:
    src: docker-compose.lite.yml.j2
    dest: "{{ openclaw_control_plane_profile_dir }}/docker-compose.yml"
    owner: "{{ openclaw_control_plane_owner }}"
    group: "{{ openclaw_control_plane_group }}"
    mode: '0644'
  when: profile.mode == 'lite'

- name: Render Prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ openclaw_control_plane_profile_dir }}/prometheus/prometheus.yml"
    owner: "{{ openclaw_control_plane_owner }}"
    group: "{{ openclaw_control_plane_group }}"
    mode: '0644'

- name: Render Grafana datasource provisioning
  ansible.builtin.template:
    src: grafana-datasources.yml.j2
    dest: "{{ openclaw_control_plane_profile_dir }}/grafana/provisioning/datasources/datasource.yml"
    owner: "{{ openclaw_control_plane_owner }}"
    group: "{{ openclaw_control_plane_group }}"
    mode: '0644'

- name: Deploy control-plane stack with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ openclaw_control_plane_profile_dir }}"
    project_name: "{{ openclaw_control_plane_project_prefix }}-{{ profile.name }}"
    files:
      - docker-compose.yml
    state: present
    build: always
    remove_orphans: true
  when: openclaw_control_plane_manage_stack | bool

- name: Wait for profile postgres container to accept local connections
  ansible.builtin.shell: |
    docker exec \
      -e PGPASSWORD='{{ profile.postgres_admin_password | default(profile.postgres_password) | replace("'", "'\"'\"'") }}' \
      {{ openclaw_control_plane_project_prefix }}-{{ profile.name }}-postgres-1 \
      psql -h 127.0.0.1 \
      -U {{ profile.postgres_admin_user | default(profile.postgres_user | default('openclaw')) }} \
      -d {{ profile.postgres_db | default('openclaw_control') }} \
      -tAc 'select 1'
  register: profile_postgres_ready
  retries: 30
  delay: 2
  until:
    - profile_postgres_ready.rc == 0
    - "'1' in profile_postgres_ready.stdout"
  changed_when: false
  when: openclaw_control_plane_manage_stack | bool

- name: Reconcile postgres role password for control-plane profile
  ansible.builtin.shell: |
    docker exec -i \
      -e PGPASSWORD='{{ profile.postgres_admin_password | default(profile.postgres_password) | replace("'", "'\"'\"'") }}' \
      {{ openclaw_control_plane_project_prefix }}-{{ profile.name }}-postgres-1 \
      psql -h 127.0.0.1 \
      -U {{ profile.postgres_admin_user | default(profile.postgres_user | default('openclaw')) }} \
      -d {{ profile.postgres_db | default('openclaw_control') }} \
      -v ON_ERROR_STOP=1 <<'SQL'
    DO \$\$
    BEGIN
      IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = '{{ profile.postgres_user | default('openclaw') }}') THEN
        CREATE ROLE {{ profile.postgres_user | default('openclaw') }} LOGIN PASSWORD '{{ profile.postgres_password | replace("'", "''") }}';
      ELSE
        ALTER ROLE {{ profile.postgres_user | default('openclaw') }} WITH LOGIN PASSWORD '{{ profile.postgres_password | replace("'", "''") }}';
      END IF;
    END
    \$\$;
    SQL
  register: profile_postgres_reconcile
  changed_when: false
  when: openclaw_control_plane_manage_stack | bool

- name: Probe control API health
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ profile.control_api_port | default((profile.mode == 'lite') | ternary(39111, 39101)) }}/health"
    method: GET
    status_code: 200
  register: profile_health
  retries: "{{ openclaw_control_plane_health_retries }}"
  delay: "{{ openclaw_control_plane_health_delay }}"
  until: profile_health is succeeded
  when: openclaw_control_plane_manage_stack | bool
