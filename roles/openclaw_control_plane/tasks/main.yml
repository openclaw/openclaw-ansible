---
- name: Validate control-plane profiles list
  ansible.builtin.assert:
    that:
      - openclaw_control_plane_profiles | length > 0
    fail_msg: >-
      openclaw_control_plane_enabled=true requires openclaw_control_plane_profiles
      with at least one profile.

- name: Validate control-plane profile schema
  ansible.builtin.assert:
    that:
      - profile.name is defined
      - profile.name | length > 0
      - profile.mode is defined
      - profile.mode in ['full', 'lite']
    fail_msg: "Each control-plane profile requires non-empty name and mode in [full, lite]."
  loop: "{{ openclaw_control_plane_profiles }}"
  loop_control:
    loop_var: profile
  no_log: true

- name: Validate unique control-plane profile names
  ansible.builtin.assert:
    that:
      - (openclaw_control_plane_profiles | map(attribute='name') | list | unique | length) ==
        (openclaw_control_plane_profiles | length)
    fail_msg: "Control-plane profile names must be unique."

- name: Validate required secrets in control-plane profile
  ansible.builtin.assert:
    that:
      - profile.postgres_password is defined
      - profile.postgres_password | length > 0
      - profile.nats_password is defined
      - profile.nats_password | length > 0
    fail_msg: "Profile {{ profile.name }} requires postgres_password and nats_password."
  when: openclaw_control_plane_require_secrets | bool
  loop: "{{ openclaw_control_plane_profiles }}"
  loop_control:
    loop_var: profile
  no_log: true

- name: Ensure control-plane runtime root exists
  ansible.builtin.file:
    path: "{{ openclaw_control_plane_runtime_root }}"
    state: directory
    owner: "{{ openclaw_control_plane_owner }}"
    group: "{{ openclaw_control_plane_group }}"
    mode: '0755'

- name: Ensure control-plane source directory exists on target
  ansible.builtin.file:
    path: "{{ openclaw_control_plane_runtime_root }}/source"
    state: directory
    owner: "{{ openclaw_control_plane_owner }}"
    group: "{{ openclaw_control_plane_group }}"
    mode: '0755'

- name: Sync control-plane source to target
  ansible.builtin.copy:
    src: "{{ openclaw_control_plane_source_dir }}/"
    dest: "{{ openclaw_control_plane_runtime_root }}/source/"
    owner: "{{ openclaw_control_plane_owner }}"
    group: "{{ openclaw_control_plane_group }}"
    mode: preserve

- name: Configure and deploy each control-plane profile
  ansible.builtin.include_tasks: profile.yml
  loop: "{{ openclaw_control_plane_profiles }}"
  loop_control:
    loop_var: profile
