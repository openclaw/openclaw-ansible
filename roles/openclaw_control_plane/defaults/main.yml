---
openclaw_control_plane_enabled: false
openclaw_control_plane_manage_stack: true
openclaw_control_plane_require_secrets: true
openclaw_control_plane_runtime_root: /opt/openclaw/control-plane
openclaw_control_plane_source_dir: "{{ playbook_dir }}/../control-plane"
openclaw_control_plane_project_prefix: ocp
openclaw_control_plane_default_nats_stream: OPENCLAW_TASKS
openclaw_control_plane_owner: "{{ ansible_user | default('openclaw') }}"
openclaw_control_plane_group: "{{ ansible_user | default('openclaw') }}"
openclaw_control_plane_env_owner: "{{ openclaw_control_plane_owner }}"
openclaw_control_plane_env_group: "{{ openclaw_control_plane_group }}"
openclaw_control_plane_worker_uid: "{{ openclaw_uid_value | default('1000') }}"
openclaw_control_plane_worker_gid: "{{ openclaw_gid_value | default(openclaw_control_plane_worker_uid) }}"
openclaw_control_plane_health_retries: 20
openclaw_control_plane_health_delay: 3

# Modes:
# - full: all services (router + broker + workers + observability)
# - lite: direct/simple path (ingress + router-forced-main + worker-main + broker + control-api)
openclaw_control_plane_profiles: []

