# OpenClaw Ansible Inventory Sample

all:
  children:
    openclaw_servers:
      hosts:
        # Example 1: Simple IP address
        192.168.1.100:

        # Example 2: Hostname with specific variables
        my-claw-server:
          ansible_host: 192.168.1.101
          ansible_user: admin
          # Override default variables for this host
          openclaw_install_mode: release

  # Global variables for all OpenClaw servers
  vars:
    # SSH Public Keys for the 'openclaw' user (Optional)
    # If set, these keys will be added to ~/.ssh/authorized_keys
    # openclaw_ssh_keys:
    #   - "ssh-ed25519 AAAAC3Nz..."
    
    # VPN Provider (Optional) - "tailscale", "netbird", or "" (none)
    # vpn_provider: "netbird"

    # Tailscale Auth Key (when vpn_provider: "tailscale")
    # tailscale_authkey: "tskey-auth-..."

    # Netbird Setup Key (when vpn_provider: "netbird")
    # netbird_setup_key: "your-setup-key"
    # netbird_management_url: "https://netbird.example.com"  # For self-hosted
